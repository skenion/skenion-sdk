name: Backfill v0.45 Canonical Tag

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: backfill-v0-45-canonical-tag
  cancel-in-progress: false

jobs:
  backfill:
    name: Create v0.45.0 tag if missing
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      EXPECTED_REPOSITORY: skenion/skenion-sdk
      EXPECTED_COMMIT: 87206ead1e9530d43fbd794bdbab80c632080710
      LEGACY_TAG: skenion-sdk-v0.45.0
      CANONICAL_TAG: v0.45.0
    steps:
      - name: Backfill canonical lightweight tag
        shell: bash
        run: |
          set -euo pipefail

          fail() {
            echo "::error::$*" >&2
            exit 1
          }

          if [[ -z "${GH_TOKEN:-}" ]]; then
            fail "secrets.GH_TOKEN is required; refusing to run without the configured release automation token"
          fi

          if [[ "${GITHUB_REPOSITORY:-}" != "${EXPECTED_REPOSITORY}" ]]; then
            fail "this workflow may only run in ${EXPECTED_REPOSITORY}; current repository is ${GITHUB_REPOSITORY:-<unset>}"
          fi

          python3 <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          API_ROOT = "https://api.github.com"
          EXPECTED_REPOSITORY = os.environ["EXPECTED_REPOSITORY"]
          EXPECTED_COMMIT = os.environ["EXPECTED_COMMIT"]
          LEGACY_TAG = os.environ["LEGACY_TAG"]
          CANONICAL_TAG = os.environ["CANONICAL_TAG"]
          TOKEN = os.environ["GH_TOKEN"]
          SHA_RE = re.compile(r"^[0-9a-f]{40}$")


          def fail(message):
            print(f"::error::{message}", file=sys.stderr)
            sys.exit(1)


          def validate_sha(sha, context):
            if not isinstance(sha, str) or SHA_RE.fullmatch(sha) is None:
              fail(f"{context} did not resolve to a full Git object SHA")
            return sha


          def api_request(method, path, payload=None):
            url = f"{API_ROOT}/repos/{EXPECTED_REPOSITORY}{path}"
            data = None
            headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {TOKEN}",
              "X-GitHub-Api-Version": "2022-11-28",
            }
            if payload is not None:
              data = json.dumps(payload).encode("utf-8")
              headers["Content-Type"] = "application/json"

            request = urllib.request.Request(url, data=data, headers=headers, method=method)
            try:
              with urllib.request.urlopen(request, timeout=30) as response:
                body = response.read().decode("utf-8")
                return response.status, body
            except urllib.error.HTTPError as error:
              body = error.read().decode("utf-8", errors="replace")
              return error.code, body
            except urllib.error.URLError as error:
              fail(f"GitHub API request to {path} failed before receiving a response: {error.reason}")


          def parse_json(body, context):
            try:
              return json.loads(body)
            except json.JSONDecodeError as error:
              fail(f"{context} returned invalid JSON: {error}")


          def summarize_error(body):
            try:
              parsed = json.loads(body)
            except json.JSONDecodeError:
              return body[:400]
            message = parsed.get("message") if isinstance(parsed, dict) else None
            return message if isinstance(message, str) else body[:400]


          def exact_ref_path(tag_name):
            return f"refs/tags/{tag_name}"


          def read_tag_ref(tag_name, *, required):
            encoded_tag = urllib.parse.quote(tag_name, safe="")
            status, body = api_request("GET", f"/git/ref/tags/{encoded_tag}")
            if status == 404 and not required:
              return None
            if status == 404:
              fail(f"required tag {exact_ref_path(tag_name)} is missing")
            if status != 200:
              fail(f"failed to read {exact_ref_path(tag_name)}: HTTP {status}: {summarize_error(body)}")

            parsed = parse_json(body, f"{exact_ref_path(tag_name)} lookup")
            if not isinstance(parsed, dict):
              fail(f"unsafe ref lookup for {exact_ref_path(tag_name)}: expected one exact ref object")
            if parsed.get("ref") != exact_ref_path(tag_name):
              fail(f"unsafe ref lookup for {exact_ref_path(tag_name)} returned {parsed.get('ref')!r}")

            ref_object = parsed.get("object")
            if not isinstance(ref_object, dict):
              fail(f"{exact_ref_path(tag_name)} response did not include a Git object")

            object_type = ref_object.get("type")
            object_sha = validate_sha(ref_object.get("sha"), f"{exact_ref_path(tag_name)} object")
            if object_type not in {"commit", "tag"}:
              fail(f"unsafe object type for {exact_ref_path(tag_name)}: {object_type!r}")

            return {
              "ref": parsed["ref"],
              "object_type": object_type,
              "object_sha": object_sha,
            }


          def resolve_legacy_commit(ref):
            if ref["object_type"] == "commit":
              return ref["object_sha"]

            status, body = api_request("GET", f"/git/tags/{ref['object_sha']}")
            if status != 200:
              fail(f"failed to resolve annotated legacy tag object {ref['object_sha']}: HTTP {status}: {summarize_error(body)}")

            parsed = parse_json(body, f"{LEGACY_TAG} annotated tag")
            if not isinstance(parsed, dict):
              fail(f"unsafe legacy tag object resolution for {LEGACY_TAG}: expected one tag object")
            if parsed.get("sha") != ref["object_sha"]:
              fail(f"unsafe legacy tag object resolution for {LEGACY_TAG}: object SHA mismatch")
            if parsed.get("tag") != LEGACY_TAG:
              fail(f"unsafe legacy tag object resolution for {LEGACY_TAG}: tag object name mismatch")

            target = parsed.get("object")
            if not isinstance(target, dict):
              fail(f"legacy tag object {ref['object_sha']} does not include a target object")
            if target.get("type") != "commit":
              fail(f"unsafe legacy tag object target for {LEGACY_TAG}: {target.get('type')!r}")

            return validate_sha(target.get("sha"), f"{LEGACY_TAG} annotated tag target")


          def validate_canonical_ref(ref):
            if ref["object_type"] != "commit":
              fail(f"{exact_ref_path(CANONICAL_TAG)} exists but is not a lightweight commit ref")
            if ref["object_sha"] != EXPECTED_COMMIT:
              fail(
                f"{exact_ref_path(CANONICAL_TAG)} points to {ref['object_sha']}, "
                f"expected {EXPECTED_COMMIT}"
              )


          if validate_sha(EXPECTED_COMMIT, "expected commit") != EXPECTED_COMMIT:
            fail("invalid expected commit")

          legacy_ref = read_tag_ref(LEGACY_TAG, required=True)
          legacy_commit = resolve_legacy_commit(legacy_ref)
          if legacy_commit != EXPECTED_COMMIT:
            fail(f"{exact_ref_path(LEGACY_TAG)} resolves to {legacy_commit}, expected {EXPECTED_COMMIT}")

          canonical_ref = read_tag_ref(CANONICAL_TAG, required=False)
          if canonical_ref is not None:
            validate_canonical_ref(canonical_ref)
            print(f"{exact_ref_path(CANONICAL_TAG)} already points to {EXPECTED_COMMIT}; no action needed")
            sys.exit(0)

          payload = {
            "ref": exact_ref_path(CANONICAL_TAG),
            "sha": EXPECTED_COMMIT,
          }
          status, body = api_request("POST", "/git/refs", payload)
          if status == 201:
            created = parse_json(body, f"{exact_ref_path(CANONICAL_TAG)} creation")
            if not isinstance(created, dict):
              fail(f"unsafe creation response for {exact_ref_path(CANONICAL_TAG)}")
            if created.get("ref") != exact_ref_path(CANONICAL_TAG):
              fail(f"GitHub API created unexpected ref {created.get('ref')!r}")
            created_object = created.get("object")
            if not isinstance(created_object, dict):
              fail(f"creation response for {exact_ref_path(CANONICAL_TAG)} did not include an object")
            if created_object.get("type") != "commit":
              fail(f"creation response for {exact_ref_path(CANONICAL_TAG)} was not a commit ref")
            if validate_sha(created_object.get("sha"), f"{exact_ref_path(CANONICAL_TAG)} created object") != EXPECTED_COMMIT:
              fail(f"creation response for {exact_ref_path(CANONICAL_TAG)} did not point to {EXPECTED_COMMIT}")
            print(f"created {exact_ref_path(CANONICAL_TAG)} at {EXPECTED_COMMIT}")
            sys.exit(0)

          if status == 422:
            raced_ref = read_tag_ref(CANONICAL_TAG, required=False)
            if raced_ref is not None:
              validate_canonical_ref(raced_ref)
              print(f"{exact_ref_path(CANONICAL_TAG)} now points to {EXPECTED_COMMIT}; no action needed")
              sys.exit(0)

          fail(f"failed to create {exact_ref_path(CANONICAL_TAG)}: HTTP {status}: {summarize_error(body)}")
          PY
