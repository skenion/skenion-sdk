name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.45.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    steps:
      - id: release
        name: Resolve SDK release version
        shell: bash
        run: |
          set -euo pipefail

          prefix="v"
          if [[ "${RELEASE_TAG}" != "${prefix}"* ]]; then
            echo "release tag ${RELEASE_TAG} must start with ${prefix}" >&2
            exit 1
          fi

          sdk_version="${RELEASE_TAG#"${prefix}"}"
          if ! [[ "${sdk_version}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "SDK release version ${sdk_version} must be SemVer-like x.y.z" >&2
            exit 1
          fi

          echo "version=${sdk_version}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - id: package
        name: Validate package metadata
        shell: bash
        env:
          SDK_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");

          const sdkVersion = process.env.SDK_VERSION;
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const errors = [];

          if (pkg.name !== "@skenion/sdk") {
            errors.push(`package name ${pkg.name ?? "<missing>"} must be @skenion/sdk`);
          }

          if (pkg.version !== sdkVersion) {
            errors.push(`package version ${pkg.version} must match SDK release tag ${sdkVersion}`);
          }

          if (errors.length > 0) {
            for (const error of errors) {
              console.error(error);
            }
            process.exit(1);
          }
          NODE

          node scripts/validate-contracts-dependency-range.mjs
          echo "version=${SDK_VERSION}" >> "${GITHUB_OUTPUT}"
          contracts_range="$(node <<'NODE'
          const fs = require("node:fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          console.log(pkg.peerDependencies["@skenion/contracts"]);
          NODE
          )"
          echo "contracts_range=${contracts_range}" >> "${GITHUB_OUTPUT}"
      - id: contracts
        name: Resolve released contracts package
        shell: bash
        env:
          CONTRACTS_RANGE: ${{ steps.package.outputs.contracts_range }}
        run: |
          set -euo pipefail

          versions_json="$(npm view @skenion/contracts versions --json)"

          contracts_version="$(CONTRACTS_VERSIONS_JSON="${versions_json}" node <<'NODE'
          function parseVersion(version) {
            const match = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.exec(version);
            return match === null ? undefined : match.slice(1).map(Number);
          }

          function compareVersions(left, right) {
            const leftParts = parseVersion(left);
            const rightParts = parseVersion(right);
            if (leftParts === undefined || rightParts === undefined) {
              throw new Error("cannot compare malformed SemVer versions");
            }
            for (let index = 0; index < leftParts.length; index += 1) {
              const diff = leftParts[index] - rightParts[index];
              if (diff !== 0) {
                return diff;
              }
            }
            return 0;
          }

          const range = process.env.CONTRACTS_RANGE;
          const rangeMatch = /^>=0\.(\d+)\.0 <0\.(\d+)\.0$/.exec(range);
          if (rangeMatch === null || Number(rangeMatch[2]) !== Number(rangeMatch[1]) + 1) {
            console.error(`unsupported @skenion/contracts peer range ${range}`);
            process.exit(1);
          }

          const supportedMinor = Number(rangeMatch[1]);
          const versions = JSON.parse(process.env.CONTRACTS_VERSIONS_JSON ?? "[]");
          const publishedVersions = Array.isArray(versions) ? versions : [versions];
          const candidates = publishedVersions
            .filter((version) => {
              if (typeof version !== "string") {
                return false;
              }
              const parsed = parseVersion(version);
              return parsed !== undefined && parsed[0] === 0 && parsed[1] === supportedMinor;
            })
            .sort(compareVersions);

          const contractsVersion = candidates.at(-1);
          if (contractsVersion === undefined) {
            console.error(`no published @skenion/contracts version satisfies ${range}`);
            process.exit(1);
          }

          console.log(contractsVersion);
          NODE
          )"

          actual="$(npm view "@skenion/contracts@${contracts_version}" version)"
          if [[ "${actual}" != "${contracts_version}" ]]; then
            echo "npm resolved @skenion/contracts@${contracts_version} to ${actual}" >&2
            exit 1
          fi

          echo "version=${contracts_version}" >> "${GITHUB_OUTPUT}"
      - name: Use released contracts package
        shell: bash
        env:
          CONTRACTS_VERSION: ${{ steps.contracts.outputs.version }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");

          const contractsVersion = process.env.CONTRACTS_VERSION;
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          pkg.devDependencies ??= {};
          pkg.devDependencies["@skenion/contracts"] = contractsVersion;
          fs.writeFileSync("package.json", `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run build
      - id: registry
        env:
          SDK_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "@skenion/sdk@${SDK_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi
      - if: steps.registry.outputs.published != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
