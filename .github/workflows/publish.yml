name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example skenion-sdk-v0.3.1
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name || inputs.tag, 'skenion-sdk-v')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - id: contracts
        run: |
          version="$(node -p "require('./package.json').peerDependencies['@skenion/contracts'].replace(/^[~^=>< ]+/, '')")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=skenion-contracts-v${version}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-contracts
          ref: ${{ steps.contracts.outputs.tag }}
          path: .deps/skenion-contracts
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
        working-directory: .deps/skenion-contracts
      - run: pnpm run build
        working-directory: .deps/skenion-contracts
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - id: package
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - run: |
          expected="skenion-sdk-v${{ steps.package.outputs.version }}"
          actual="${RELEASE_TAG}"
          if [[ "${actual}" != "${expected}" ]]; then
            echo "release tag ${actual} does not match package version ${expected}" >&2
            exit 1
          fi
      - id: registry
        run: |
          if npm view "@skenion/sdk@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi
      - if: steps.registry.outputs.published != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
