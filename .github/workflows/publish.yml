name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example skenion-sdk-v0.3.1
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name || inputs.tag, 'skenion-sdk-v')
    steps:
      - id: train
        name: Resolve release train version
        shell: bash
        run: |
          set -euo pipefail

          prefix="skenion-sdk-v"
          if [[ "${RELEASE_TAG}" != "${prefix}"* ]]; then
            echo "release tag ${RELEASE_TAG} must start with ${prefix}" >&2
            exit 1
          fi

          train_version="${RELEASE_TAG#${prefix}}"
          if ! [[ "${train_version}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "release train version ${train_version} must be SemVer-like x.y.z" >&2
            exit 1
          fi

          echo "version=${train_version}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - id: package
        name: Validate package train versions
        shell: bash
        env:
          TRAIN_VERSION: ${{ steps.train.outputs.version }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");

          const trainVersion = process.env.TRAIN_VERSION;
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const peer = pkg.peerDependencies?.["@skenion/contracts"];
          const errors = [];

          if (pkg.version !== trainVersion) {
            errors.push(`package version ${pkg.version} must match release train ${trainVersion}`);
          }

          if (peer !== trainVersion) {
            const broadPeer = typeof peer === "string" && /[\^~*xX<>=| ]/.test(peer);
            const detail = broadPeer
              ? `broad peer dependency ${peer} is not allowed for release publishing`
              : `peer dependency ${peer ?? "<missing>"} must exactly match release train ${trainVersion}`;
            errors.push(`@skenion/contracts ${detail}`);
          }

          if (errors.length > 0) {
            for (const error of errors) {
              console.error(error);
            }
            process.exit(1);
          }
          NODE

          echo "version=${TRAIN_VERSION}" >> "${GITHUB_OUTPUT}"
      - name: Verify released contracts package
        shell: bash
        env:
          TRAIN_VERSION: ${{ steps.train.outputs.version }}
        run: |
          set -euo pipefail

          actual="$(npm view "@skenion/contracts@${TRAIN_VERSION}" version)"
          if [[ "${actual}" != "${TRAIN_VERSION}" ]]; then
            echo "npm resolved @skenion/contracts@${TRAIN_VERSION} to ${actual}" >&2
            exit 1
          fi
      - name: Use released contracts package
        shell: bash
        env:
          TRAIN_VERSION: ${{ steps.train.outputs.version }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");

          const trainVersion = process.env.TRAIN_VERSION;
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          pkg.devDependencies ??= {};
          pkg.devDependencies["@skenion/contracts"] = trainVersion;
          fs.writeFileSync("package.json", `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run build
      - id: registry
        env:
          SDK_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "@skenion/sdk@${SDK_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi
      - if: steps.registry.outputs.published != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
