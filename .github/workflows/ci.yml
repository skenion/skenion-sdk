name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Resolve contracts source ref
        id: contracts
        shell: bash
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if git ls-remote --exit-code --heads https://github.com/skenion/skenion-contracts.git "refs/heads/${branch}" >/dev/null; then
            ref="${branch}"
          else
            ref="main"
          fi
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
          echo "Using skenion/skenion-contracts@${ref}"
      - uses: actions/checkout@v6
        with:
          repository: skenion/skenion-contracts
          ref: ${{ steps.contracts.outputs.ref }}
          path: .deps/skenion-contracts
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .deps/skenion-contracts
      - run: pnpm run build
        working-directory: .deps/skenion-contracts
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
