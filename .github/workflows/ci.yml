name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sdk:
    name: SDK build and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Validate SDK Contracts dependency range
        shell: bash
        run: node scripts/validate-contracts-dependency-range.mjs
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
