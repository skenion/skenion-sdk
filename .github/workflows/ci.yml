name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Validate SDK Contracts dependency range
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");

          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const expected = ">=0.45.0 <0.46.0";
          const peer = pkg.peerDependencies?.["@skenion/contracts"];
          const dev = pkg.devDependencies?.["@skenion/contracts"];
          const errors = [];

          if (peer !== expected) {
            errors.push(`@skenion/contracts peer dependency must be ${expected}; received ${peer ?? "<missing>"}`);
          }

          if (dev !== expected) {
            errors.push(`@skenion/contracts devDependency must be ${expected}; received ${dev ?? "<missing>"}`);
          }

          if (errors.length > 0) {
            for (const error of errors) {
              console.error(error);
            }
            process.exit(1);
          }
          NODE
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
